<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Web Page</title>

    <!-- Подключение шрифтов -->
    <style>
        @font-face {
            font-family: "MyFont";
            src: url("fonts/font.woff");
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            font-family: "MyFont", cursive;
        }
    </style>
</head>

<body>

<h1>BABUNASHVILI ROBERT</h1>

<h2>📸 Photos</h2>
<img src="images/photo.jpg" width="300">
<p>JPEG: small size, good for photos</p>

<img src="images/photo.png" width="300">
<p>PNG: high quality, supports transparency</p>

<h2>🎨 Graphics</h2>
<img src="images/graphic.svg" width="300">
<p>SVG: vector format, scalable</p>

<img src="images/graphic.webp" width="300">
<p>WEBP: modern format, smaller size</p>

<h2>🎵 Sound</h2>
<audio controls>
    <source src="audio/sound.mp3" type="audio/mpeg">
</audio>

<h2>🎞 GIF</h2>
<img src="images/animation.gif" width="300">

<h2>🎬 Video</h2>
<iframe width="560" height="315"
src="https://www.youtube.com/embed/dQw4w9WgXcQ">
</iframe>


</body>
</html>
